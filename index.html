<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미로</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>

    <!-- ① 로그인 패널 -->
    <div id="login-panel">
        <div class="login-box">
            <div class="login-logo">
                <span class="logo-abyss">ㅁㅁ</span>
                <span class="logo-maze">의 미로</span>
            </div>
            <p class="login-sub">진입할 이름을 입력하세요</p>
            <input type="text" id="playerIdInput" placeholder="닉네임 입력" autocomplete="off" maxlength="16">
            <button id="startGameBtn">미로 입장</button>
            <div class="divider"></div>
            <button id="joystickBtn" id="joystickBtn">🎮 조이스틱 연결</button>
            <div id="joystick-status"></div>
            <div class="login-controls">
                <span>WASD / 방향키: 이동</span>
                <span>마우스: 시점 회전</span>
                <span>숫자 1~5: 퀴즈 응답</span>
                <span>.</span>
            </div>
        </div>
    </div>

    <!-- ② 게임 컨테이너 -->
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <canvas id="minimap" width="160" height="100"></canvas>

        <!-- HUD -->
        <div id="hud">
            <div class="hud-item" id="hud-time">⏱ <span id="hud-time-val">00:00</span></div>
            <div class="hud-item" id="hud-quiz">✅ <span id="hud-quiz-val">0 / 0</span></div>
            <div class="hud-item" id="hud-player">👤 <span id="hud-player-val">Guest</span></div>
        </div>

        <!-- 입장 안내 -->
        <div id="instruction" class="hidden">
            화면을 클릭하여 진입하세요
            <br><span class="instruction-sub">ESC: 마우스 잠금 해제 ｜ 조이스틱 ACTION: 진입</span>
        </div>

        <!-- 조이스틱 연결 뱃지 -->
        <div id="joystick-badge" class="hidden">🎮 조이스틱 연결됨</div>

        <!-- 탈출구 나침반 -->
        <div id="compass">
            <div id="compass-arrow">▲</div>
            <div id="compass-label">탈출구</div>
        </div>
    </div>

    <!-- ③ 문제 풀이 패널 -->
    <div id="math-panel" class="hidden">
        <div id="quiz-header">
            <span id="quiz-lang-tag">언어: ---</span>
            <span id="quiz-counter">문제</span>
        </div>
        <div id="question-text" class="question">문제를 생성 중입니다...</div>
        <div id="options-text" class="options"></div>
        <div class="timer-bar"><div id="timer-fill"></div></div>
        <div id="joystick-quiz-hint" class="hidden">🎮 ↑↓ 선택 &nbsp;｜&nbsp; ACTION 버튼: 제출</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
